<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form input {
            margin-bottom: 1rem;
            height: 25px;
            width: 250px !important;
        }

        @media screen and (max-width: 500px) {
            img {
                width: 100%;
                height: auto;
                margin-left: -2rem;
            }

            .main {
                flex-direction: column;
                align-items: center;
                width: 100%;
            }

            .form {
                margin-top: -2rem !important;
                padding: 1rem;
            }

            button {
                text-align: center;
            }
        }
    </style>
</head>
<!-- Create a responsive webpage with a form on one side and an image on the other using
Flexbox. -->

<body>
    <h2 style="padding: 2rem; text-align: center;">Registration From</h2>
    <div style="display: flex ; justify-content: center; " class="main">
        <div class="form" style="margin-top:3rem;">
            <form action="#">
                <label for="name">Name:</label>
                <br>
                <input type="text" name="name" id="name" required>
                <br>
                <label for="email">Email:</label>
                <br>
                <input type="email" name="email " id="email" required>
                <br>
                <label for="phone">Contact:</label>
                <br>
                <input type="number" name="content" id="phone" required>
                <br>
                <label for="password"> password:</label>
                <br>
                <input type="password" id="password">
                <br>
                <label for="pass"> Conform password:</label>
                <br>
                <input type="password" id="pass" required>
                <br>
                <button type="submit"
                    style="background-color: rgb(78, 254, 78); border-radius: 5%; height: 30px; width: 100%; ">Register</button>
            </form>
        </div>
        <div class="img">
            <img src="image.png" alt="image" style="height: 75%;">
        </div>
    </div>
</body>

</html>
